services:
  postgres:
    image: postgres:16-alpine
    container_name: ronsel-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ronsel
    volumes:
      - ronsel_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ronsel"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ronsel_pg_data:
